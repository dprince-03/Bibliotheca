services:
# App
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: air
    container_name: bibliotheca_app
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - DB_HOST=mysql # use service name, not localhost
      - REDIS_HOST=redis # use service name, not localhost
    volumes:
      - .:app
      - ./cmd/api:/app/cmd/api
      - go_modules:/root/go/pkg/mod # cache Go modules
      - ./storage:/app/storage # persist uploaded files
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bibliotheca_network

# Database
  mysql:
    image: mysql:latest
    container_name: bibliotheca_mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      name=valueMYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql        # persist database data
      - ./migrations:/docker-entrypoint-initdb.d  # auto-run migrations on first start
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bibliotheca_network

# Redis
  redis:
    image: redis:latest
    container_name: bibliotheca_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"       # expose for local Redis clients (RedisInsight)
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --appendonly yes
      --maxmemory 500mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data                 # persist Redis data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bibliotheca_network

# Volumes
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  go_modules:
    driver: local
 
# Networks
networks:
  bibliotheca_network:
    driver: bridge
 